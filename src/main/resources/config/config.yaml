# 云雀(Skylark) 配置文件

mode: local
wake_word: ""
interrupt: true

asr:
  # Available adapters:
  #   DirectASRAdapter          — local VAD-gated Vosk (default)
  #   HttpASRAdapter            — HTTP multipart upload to remote ASR service
  #   org.skylark.infrastructure.adapter.asr.QwenASRAdapter   — Tongyi Paraformer (Phase 2 [B1])
  #     Required: apiKey (DashScope API key)
  #     Optional: model (default: paraformer-realtime-v2), timeout
  class_name: DirectASRAdapter
  output_file: tmp/asr

vad:
  class_name: DirectVADAdapter
  sampling_rate: 16000
  threshold: 0.5
  min_silence_duration_ms: 500

tts:
  # Available adapters:
  #   DirectTTSAdapter          — local MaryTTS / Edge TTS (default)
  #   HttpTTSAdapter            — HTTP JSON POST to remote TTS service
  #   org.skylark.infrastructure.adapter.tts.QwenTTSAdapter   — CosyVoice / Tongyi TTS (Phase 2 [B2])
  #     Required: apiKey (DashScope API key)
  #     Optional: model (default: cosyvoice-v1), voice (default: longxiaochun), format, sampleRate
  class_name: DirectTTSAdapter
  output_file: tmp/tts
  voice: zh-CN-XiaoxiaoNeural

llm:
  class_name: OpenAILLM
  model_name: deepseek-chat
  api_key: ${DEEPSEEK_API_KEY}
  url: https://api.deepseek.com/v1

# AgentScope Framework Configuration (深度集成 AgentScope 智能体框架)
agent:
  # OpenAI-compatible model configuration (via AgentScope OpenAIChatModel)
  model_name: deepseek-chat
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com
  # Agent behavior
  system_prompt: >
    You are a professional AI training instructor with expertise in technical education.
    You maintain conversation context across interactions and provide detailed,
    accurate explanations. You can assist with complex queries in vertical business domains.
  # Maximum ReAct reasoning iterations per request (AgentScope ReActAgent循环推理最大迭代次数)
  max_iters: 10

recorder:
  mode: local

player:
  class_name: JavaSoundPlayer

dialogue:
  history_path: tmp/dialogue_history.json

memory:
  path: tmp/memory.json
  name: 云雀
  role: 智能语音助手
  personality: 友好、专业、乐于助人
  capabilities: 我可以进行语音对话，回答问题，帮助您完成各种任务。

# Full-duplex configuration (全双工配置)
# Phase 2 upgrade roadmap from DUPLEX_COMPARISON_ANALYSIS.md
duplex:
  # Modes: half | barge-in | streaming | full
  #   half      — existing half-duplex behavior (default, production-safe)
  #   barge-in  — Phase 1: TTS can be interrupted at any time
  #   streaming — Phase 2: barge-in + full streaming pipeline (low latency)
  #   full      — Phase 3: full-duplex with AEC + end-to-end model routing
  mode: half

# WebRTC strategy configuration (WebRTC 策略配置)
webrtc:
  # Available strategies:
  #   websocket — WebSocket-based (default, no external service required)
  #   kurento   — Kurento Media Server (SDP-based)
  #   livekit   — LiveKit Server (token-based)
  #   agora     — Agora RTC SDK (token-based, Phase 1 milestone)
  #   trtc      — Tencent Cloud TRTC (token-based, Phase 2 [E1])
  #   alirtc    — Alibaba Cloud RTC (token-based, Phase 2/3 [E2])
  strategy: websocket

  # Agora (声网) settings — activate with: strategy: agora
  agora:
    appId: ${AGORA_APP_ID:}
    appCertificate: ${AGORA_APP_CERTIFICATE:}
    region: cn
    sampleRate: 16000
    channels: 1
    tokenExpireSeconds: 3600

  # Tencent Cloud TRTC (腾讯云实时音视频) — activate with: strategy: trtc
  # Phase 2 [E1]: WeChat/WeCom ecosystem + Tencent AI (ASR/TTS/NLP) integration
  trtc:
    sdkAppId: ${TRTC_SDK_APP_ID:}
    secretKey: ${TRTC_SECRET_KEY:}
    tokenExpireSeconds: 86400

  # Alibaba Cloud RTC (阿里云音视频通信) — activate with: strategy: alirtc
  # Phase 2/3 [E2]: Tongyi Qwen AI integration + Alibaba CDN acceleration
  alirtc:
    appId: ${ALIRTC_APP_ID:}
    appKey: ${ALIRTC_APP_KEY:}
    tokenTtlSeconds: 3600

  # Kurento settings — activate with: strategy: kurento
  kurento:
    wsUri: ws://localhost:8888/kurento

  # LiveKit settings — activate with: strategy: livekit
  livekit:
    url: ${LIVEKIT_URL:}
    apiKey: ${LIVEKIT_API_KEY:}
    apiSecret: ${LIVEKIT_API_SECRET:}

